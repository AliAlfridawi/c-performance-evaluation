name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build C benchmarks
      run: |
        cd src/c
        gcc -std=c11 -Wall -Wextra -O2 -c algorithms.c
        gcc -std=c11 -Wall -Wextra -O2 -c benchmark.c
        gcc -std=c11 -Wall -Wextra -O2 -o benchmark benchmark.o algorithms.o
        gcc -std=c11 -Wall -Wextra -O2 -c test_algorithms.c
        gcc -std=c11 -Wall -Wextra -O2 -o test_algorithms test_algorithms.o algorithms.o

    - name: Build Java benchmarks
      run: mvn -q -DskipTests compile

    - name: Run C tests
      run: ./src/c/test_algorithms

    - name: Run Java tests
      run: mvn test

    - name: Run Python tests
      working-directory: src/python
      run: python -m unittest test_algorithms.py

    - name: Run pipeline smoke test
      run: python -m unittest test_benchmark_pipeline.py
